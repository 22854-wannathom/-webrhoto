<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานที่ท่องเที่ยวในประเทศไทย</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Sarabun', Tahoma, sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 3rem 1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        header p { font-size: 1.2rem; opacity: 0.9; }
        .gallery-container {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 3px solid #0056b3;
        }
        .card-content { padding: 1.5rem; }
        .card-content h3 { font-size: 1.3rem; color: #0056b3; margin-bottom: 0.5rem; }
        .card-content p { font-size: 0.95rem; color: #666; line-height: 1.5; }
        footer {
            text-align: center;
            padding: 2rem;
            background-color: #333;
            color: white;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>มหัศจรรย์เมืองไทย</h1>
        <p>รวบรวมภาพสถานที่ท่องเที่ยวที่สวยงามที่สุดในประเทศไทย</p>
    </header>

    <main class="gallery-container">
        <div class="card">
            <img src="https://picsum.photos/seed/thai1/400/300" alt="สถานที่ 1">
            <div class="card-content">
                <h3>วัดพระศรีรัตนศาสดาราม</h3>
                <p>จังหวัด: กรุงเทพมหานคร</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/seed/thai2/400/300" alt="สถานที่ 2">
            <div class="card-content">
                <h3>ดอยอินทนนท์</h3>
                <p>จังหวัด: เชียงใหม่</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/seed/thai3/400/300" alt="สถานที่ 3">
            <div class="card-content">
                <h3>แหลมพรหมเทพ</h3>
                <p>จังหวัด: ภูเก็ต</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/seed/thai4/400/300" alt="สถานที่ 4">
            <div class="card-content">
                <h3>เขาสก</h3>
                <p>จังหวัด: สุราษฎร์ธานี</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 เว็บไซต์รวมภาพท่องเที่ยวไทย. สร้างสรรค์ด้วยความตั้งใจ.</p>
    </footer>

</body>
</html>
