<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สถานที่ท่องเที่ยวในประเทศไทย | เที่ยวไทยไปกับเรา</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f4f7f6;
            color: #333;
        }

        /* ส่วนหัวของเว็บไซต์ (Header) */
        header {
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url('https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=1920&q=80') center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        header h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.2rem;
            font-weight: 300;
        }

        /* โครงสร้างส่วนจัดแสดงรูปภาพ (Gallery Grid) */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* การตกแต่งการ์ดรูปภาพ */
        .card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .card:hover img {
            transform: scale(1.05);
        }

        .card-info {
            padding: 20px;
            text-align: center;
        }

        .card-info h3 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .card-info p {
            font-size: 0.95rem;
            color: #7f8c8d;
        }

        /* ส่วนท้าย (Footer) */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #2c3e50;
            color: white;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>มหัศจรรย์เมืองไทย</h1>
        <p>บันทึกการเดินทางและสถานที่ท่องเที่ยวที่สวยงาม</p>
    </header>

    <div class="container">
        <div class="gallery">
            
            <div class="card">
                <img src="https://images.unsplash.com/photo-1513622470522-26c3115456f9?auto=format&fit=crop&w=800&q=80" alt="กรุงเทพมหานคร">
                <div class="card-info">
                    <h3>กรุงเทพมหานคร</h3>
                    <p>วัดอรุณราชวราราม แสงสียามค่ำคืน</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1588613437640-5e3650228d43?auto=format&fit=crop&w=800&q=80" alt="เชียงใหม่">
                <div class="card-info">
                    <h3>เชียงใหม่</h3>
                    <p>ธรรมชาติและขุนเขาที่ดอยอินทนนท์</p>
                </div>
            </div>

            <div class="card">
                <img src="https://images.unsplash.com/photo-1552465011-b4e21bf6e79a?auto=format&fit=crop&w=800&q=80" alt="ภูเก็ต">
                <div class="card-info">
                    <h3>ภูเก็ต</h3>
                    <p>ทะเลอันดามันและหาดทรายขาว</p>
                </div>
            </div>
